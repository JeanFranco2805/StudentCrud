<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Académico</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <div id="screen-login" class="screen active">
    <div class="auth-wrapper">
      <div class="auth-card">
        <div class="brand">
          <span class="brand-mark">✦</span>
          <h1>Portal Académico</h1>
          <p>Ingresa tu correo institucional para continuar</p>
        </div>
        <div class="form-group">
          <label for="email-input">Correo electrónico</label>
          <input type="email" id="email-input" placeholder="nombre@universidad.edu" />
        </div>
        <div id="login-error" class="error-msg hidden"></div>
        <button id="btn-send-otp" class="btn-primary">Enviar código</button>
      </div>
    </div>
  </div>

  <div id="screen-otp" class="screen">
    <div class="auth-wrapper">
      <div class="auth-card">
        <div class="brand">
          <span class="brand-mark">✦</span>
          <h1>Verificación</h1>
          <p id="otp-subtitle">Código enviado. Revisa tu bandeja de entrada.</p>
        </div>
        <div class="otp-inputs">
          <input type="text" maxlength="1" class="otp-digit" />
          <input type="text" maxlength="1" class="otp-digit" />
          <input type="text" maxlength="1" class="otp-digit" />
          <input type="text" maxlength="1" class="otp-digit" />
          <input type="text" maxlength="1" class="otp-digit" />
          <input type="text" maxlength="1" class="otp-digit" />
        </div>
        <div id="otp-error" class="error-msg hidden"></div>
        <button id="btn-verify-otp" class="btn-primary">Verificar</button>
        <button id="btn-back" class="btn-ghost">← Volver</button>
      </div>
    </div>
  </div>

  <div id="screen-students" class="screen">
    <header class="app-header">
      <div class="header-inner">
        <div class="header-brand">
          <span class="brand-mark">✦</span>
          <span>Portal Académico</span>
        </div>
        <div class="header-right">
          <span id="header-email" class="header-email"></span>
          <button id="btn-logout" class="btn-ghost-sm">Cerrar sesión</button>
        </div>
      </div>
    </header>

    <main class="app-main">
      <section class="form-section">
        <h2 id="form-title">Registrar estudiante</h2>
        <div class="student-form">
          <div class="form-row">
            <div class="form-group">
              <label for="student-name">Nombre completo</label>
              <input type="text" id="student-name" placeholder="Ej. Ana García" />
            </div>
            <div class="form-group">
              <label for="student-age">Edad</label>
              <input type="number" id="student-age" placeholder="Ej. 20" min="1" max="99" />
            </div>
            <div class="form-group">
              <label for="student-grade">Nota</label>
              <input type="number" id="student-grade" placeholder="Ej. 4.5" step="0.1" min="0" max="5" />
            </div>
          </div>
          <div id="form-error" class="error-msg hidden"></div>
          <div class="form-actions">
            <button id="btn-save" class="btn-primary">Guardar</button>
            <button id="btn-cancel" class="btn-ghost hidden">Cancelar</button>
          </div>
        </div>
      </section>

      <section class="table-section">
        <div class="table-header">
          <h2>Estudiantes registrados</h2>
          <span id="student-count" class="badge">0</span>
        </div>
        <div class="table-wrapper">
          <table id="students-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Edad</th>
                <th>Nota</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="students-tbody">
              <tr id="empty-row">
                <td colspan="5" class="empty-state">No hay estudiantes registrados aún</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
