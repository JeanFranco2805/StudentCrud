services:
  - type: web
    name: university-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        fromService:
          type: web
          name: university-frontend
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: university-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: university-api
          envVarKey: RENDER_EXTERNAL_URL
